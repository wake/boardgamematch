<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲名稱整合工具 - MBTI × 桌遊配對</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/hourglass-simple.css">
    <style>
        /* ── Admin Header（對齊 admin-quiz.html 格式）── */
        .admin-header {
            color: white;
            padding: 2rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
        }
        .admin-header h2 {
            margin: 0 0 0.5rem;
            color: white;
            background: none;
            -webkit-text-fill-color: white;
        }
        .admin-header p {
            margin: 0;
            opacity: 0.9;
            color: white;
        }
        .admin-header .back-btn {
            display: inline-block;
            margin-top: 0.75rem;
            padding: 0.35rem 1rem;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1.5px solid rgba(255,255,255,0.6);
            border-radius: 2rem;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: background 0.2s;
        }
        .admin-header .back-btn:hover { background: rgba(255,255,255,0.35); }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 0.75rem;
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-light);
            font-size: 0.85rem;
        }

        .merge-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .game-list-panel {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }

        .panel-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .search-box {
            margin-bottom: 1rem;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: 0.5rem;
            font-size: 1rem;
        }

        .game-item {
            background: var(--bg-color);
            padding: 1rem;
            margin-bottom: 0.75rem;
            border-radius: 0.5rem;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-item:hover {
            border-color: var(--primary-color);
            transform: translateX(4px);
        }

        .game-item.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .game-name {
            font-weight: 500;
            flex: 1;
        }

        .game-count {
            background: rgba(0,0,0,0.1);
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.85rem;
            margin-left: 1rem;
        }

        .game-item.selected .game-count {
            background: rgba(255,255,255,0.2);
        }

        .selected-panel {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
        }

        .selected-list {
            min-height: 200px;
            margin-bottom: 1rem;
        }

        .selected-item {
            background: var(--bg-color);
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .remove-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.25rem 0.75rem;
            border-radius: 0.35rem;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .remove-btn:hover {
            background: #dc2626;
        }

        .primary-select {
            margin-bottom: 1rem;
        }

        .primary-select label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .primary-select select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--border-color);
            border-radius: 0.5rem;
            font-size: 1rem;
        }

        .tab-btn {
            flex: 1;
            padding: 0.5rem 1rem;
            background: var(--bg-color);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            border-color: var(--primary-color);
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .merge-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .merge-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.3);
        }

        .merge-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        .clear-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-color);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            border-radius: 0.5rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-light);
        }

        @media (max-width: 768px) {
            .merge-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 導覽列 -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-logo">
                <div class="navbar-logo-text" style="display:flex;flex-direction:column;line-height:1.3;">
                    <span style="display:block;font-size:1.1rem;font-weight:700;">MBTI ×</span>
                    <span style="display:block;font-size:1.1rem;font-weight:700;">桌遊配對</span>
                </div>
            </a>
            <ul class="navbar-menu">
                <li><a href="index.html">回到首頁</a></li>
                <li><a href="explore.html">玩家數據</a></li>
                <li><a href="recommend.html">桌遊探索</a></li>
                <li><a href="quiz.html">桌遊問答</a></li>
                <li><a href="leaderboard.html">貢獻排行</a></li>
                <li><a href="profile.html">我的檔案</a></li>
            </ul>
        </div>
    </nav>

    <!-- 主要內容 -->
    <div class="admin-container">
        <!-- 頁面標題 -->
        <div class="admin-header" style="background: linear-gradient(135deg, #ef4444 0%, #ec4899 50%, #a855f7 100%);">
            <h2>🔗 遊戲名稱整合工具</h2>
            <p>合併重複遊戲名稱，統一為標準格式並更新所有使用者資料</p>
            <a href="admin.html" class="back-btn">← 返回管理後台</a>
        </div>

        <!-- 統計資訊 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="total-games">-</div>
                <div class="stat-label">🎮 總遊戲名稱數</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-users">-</div>
                <div class="stat-label">👥 參與玩家數</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="selected-count">0</div>
                <div class="stat-label">✅ 已選擇名稱</div>
            </div>
        </div>

        <!-- 合併介面 -->
        <div class="merge-container">
            <!-- 左側：遊戲列表 -->
            <div class="game-list-panel">
                <div class="panel-header">
                    <span class="panel-title">📋 所有遊戲名稱</span>
                    <span style="color: var(--text-light); font-size: 0.9rem;">點擊選擇要合併的名稱</span>
                </div>

                <div class="search-box">
                    <input type="text" id="search-input" placeholder="🔍 搜尋遊戲名稱..." oninput="filterGames()">
                </div>

                <div id="game-list">
                    <div class="empty-state">
                        <div class="simple-hourglass" style="margin: 0 auto 1rem;"><div class="hourglass">⏳</div></div>
                        <p>載入中...</p>
                    </div>
                </div>
            </div>

            <!-- 右側：已選擇與合併操作 -->
            <div class="selected-panel">
                <div class="panel-header">
                    <span class="panel-title">✨ 選擇的名稱</span>
                </div>

                <div class="selected-list" id="selected-list">
                    <div class="empty-state">
                        <p>👈 從左側選擇要合併的遊戲名稱</p>
                    </div>
                </div>

                <div class="primary-select">
                    <label>主要名稱（合併後的標準名稱）：</label>
                    <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                        <button class="tab-btn active" id="select-tab" onclick="switchInputMode('select')">
                            📋 選擇現有
                        </button>
                        <button class="tab-btn" id="input-tab" onclick="switchInputMode('input')">
                            ✏️ 自行輸入
                        </button>
                    </div>
                    <select id="primary-name-select" disabled>
                        <option value="">請先選擇遊戲</option>
                    </select>
                    <input type="text" id="primary-name-input" placeholder="輸入合併後的標準名稱..." 
                           style="display: none; width: 100%; padding: 0.75rem; border: 2px solid var(--border-color); border-radius: 0.5rem; font-size: 1rem;">
                </div>

                <button class="merge-btn" id="merge-btn" onclick="mergeGames()" disabled>
                    🔗 合併選中的名稱
                </button>
                <button class="clear-btn" onclick="clearSelection()">
                    🗑️ 清空選擇
                </button>
            </div>
        </div>
    </div>

    <!-- Google Sign-In SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- 管理後台驗證 -->
    <script src="js/admin-auth.js?v=20240222-fix"></script>
    <script src="js/show-admin-link.js?v=20240222-fix"></script>
    <script src="js/admin-navbar-cleanup.js"></script>
    <script>
        let allGames = new Map(); // name -> {count, users}
        let selectedGames = new Set();
        let inputMode = 'select'; // 'select' or 'input'

        // 切換輸入模式
        function switchInputMode(mode) {
            inputMode = mode;
            
            const selectTab = document.getElementById('select-tab');
            const inputTab = document.getElementById('input-tab');
            const selectElement = document.getElementById('primary-name-select');
            const inputElement = document.getElementById('primary-name-input');

            if (mode === 'select') {
                selectTab.classList.add('active');
                inputTab.classList.remove('active');
                selectElement.style.display = 'block';
                inputElement.style.display = 'none';
            } else {
                selectTab.classList.remove('active');
                inputTab.classList.add('active');
                selectElement.style.display = 'none';
                inputElement.style.display = 'block';
            }

            updateMergeButton();
        }

        // 更新合併按鈕狀態
        function updateMergeButton() {
            const count = selectedGames.size;
            const mergeBtn = document.getElementById('merge-btn');
            
            if (count < 2) {
                mergeBtn.disabled = true;
                return;
            }

            if (inputMode === 'select') {
                const selectValue = document.getElementById('primary-name-select').value;
                mergeBtn.disabled = !selectValue;
            } else {
                const inputValue = document.getElementById('primary-name-input').value.trim();
                mergeBtn.disabled = !inputValue;
            }
        }

        // 載入所有遊戲名稱
        async function loadGames() {
            try {
                // 載入所有使用者
                const response = await fetch('tables/users?limit=1000');
                const data = await response.json();
                
                allGames.clear();
                
                // 統計每個遊戲名稱出現次數和使用者
                (data.data || []).forEach(user => {
                    const games = [
                        ...(user.liked_games || []),
                        ...(user.disliked_games || []),
                        ...(user.wishlist || [])
                    ];
                    
                    games.forEach(game => {
                        if (!allGames.has(game)) {
                            allGames.set(game, { count: 0, users: new Set() });
                        }
                        const gameData = allGames.get(game);
                        gameData.count++;
                        gameData.users.add(user.username || user.email);
                    });
                });

                // 更新統計
                document.getElementById('total-games').textContent = allGames.size;
                document.getElementById('total-users').textContent = data.total || 0;

                // 渲染遊戲列表
                renderGameList();

            } catch (error) {
                console.error('載入遊戲失敗:', error);
                document.getElementById('game-list').innerHTML = `
                    <div class="empty-state">
                        <p>❌ 載入失敗</p>
                    </div>
                `;
            }
        }

        // 渲染遊戲列表
        function renderGameList() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            
            // 轉換為陣列並排序（依使用次數）
            let games = Array.from(allGames.entries())
                .filter(([name]) => name.toLowerCase().includes(searchTerm))
                .sort((a, b) => b[1].count - a[1].count);

            if (games.length === 0) {
                document.getElementById('game-list').innerHTML = `
                    <div class="empty-state">
                        <p>😕 找不到符合的遊戲</p>
                    </div>
                `;
                return;
            }

            const html = games.map(([name, data]) => `
                <div class="game-item ${selectedGames.has(name) ? 'selected' : ''}" 
                     onclick="toggleGame('${name.replace(/'/g, "\\'")}')">
                    <span class="game-name">${name}</span>
                    <span class="game-count">${data.count} 次使用</span>
                </div>
            `).join('');

            document.getElementById('game-list').innerHTML = html;
        }

        // 切換選擇狀態
        function toggleGame(name) {
            if (selectedGames.has(name)) {
                selectedGames.delete(name);
            } else {
                selectedGames.add(name);
            }
            
            updateSelectedList();
            renderGameList();
        }

        // 更新已選擇列表
        function updateSelectedList() {
            const count = selectedGames.size;
            document.getElementById('selected-count').textContent = count;

            if (count === 0) {
                document.getElementById('selected-list').innerHTML = `
                    <div class="empty-state">
                        <p>👈 從左側選擇要合併的遊戲名稱</p>
                    </div>
                `;
                document.getElementById('primary-name-select').disabled = true;
                document.getElementById('primary-name-select').innerHTML = '<option value="">請先選擇遊戲</option>';
                document.getElementById('primary-name-input').disabled = true;
                document.getElementById('primary-name-input').value = '';
                updateMergeButton();
                return;
            }

            // 渲染已選擇列表
            const html = Array.from(selectedGames).map(name => `
                <div class="selected-item">
                    <span>${name}</span>
                    <button class="remove-btn" onclick="toggleGame('${name.replace(/'/g, "\\'")}')">移除</button>
                </div>
            `).join('');
            document.getElementById('selected-list').innerHTML = html;

            // 更新主要名稱選項
            const options = Array.from(selectedGames).map(name => 
                `<option value="${name}">${name}</option>`
            ).join('');
            document.getElementById('primary-name-select').innerHTML = options;
            document.getElementById('primary-name-select').disabled = false;
            
            // 啟用輸入框
            document.getElementById('primary-name-input').disabled = false;

            // 監聽選擇和輸入的變化
            document.getElementById('primary-name-select').onchange = updateMergeButton;
            document.getElementById('primary-name-input').oninput = updateMergeButton;

            updateMergeButton();
        }

        // 清空選擇
        function clearSelection() {
            selectedGames.clear();
            updateSelectedList();
            renderGameList();
        }

        // 過濾遊戲
        function filterGames() {
            renderGameList();
        }

        // 合併遊戲
        async function mergeGames() {
            if (selectedGames.size < 2) {
                alert('請至少選擇 2 個遊戲名稱！');
                return;
            }

            let primaryName;
            if (inputMode === 'select') {
                primaryName = document.getElementById('primary-name-select').value;
            } else {
                primaryName = document.getElementById('primary-name-input').value.trim();
            }

            if (!primaryName) {
                alert('請輸入或選擇主要名稱！');
                return;
            }

            const otherNames = Array.from(selectedGames).filter(name => name !== primaryName);
            
            // 如果是自行輸入的新名稱，顯示不同的確認訊息
            let confirmMsg;
            if (selectedGames.has(primaryName)) {
                confirmMsg = `確定要將以下名稱合併為「${primaryName}」嗎？\n\n${otherNames.join('\n')}\n\n⚠️ 此操作會更新所有使用者的資料，無法復原！`;
            } else {
                confirmMsg = `確定要將以下名稱合併為新名稱「${primaryName}」嗎？\n\n${Array.from(selectedGames).join('\n')}\n\n⚠️ 此操作會更新所有使用者的資料，無法復原！`;
            }
            
            if (!confirm(confirmMsg)) {
                return;
            }

            try {
                document.getElementById('merge-btn').disabled = true;
                document.getElementById('merge-btn').textContent = '⏳ 處理中...';

                // 載入所有使用者
                const response = await fetch('tables/users?limit=1000');
                const data = await response.json();
                
                let updatedUsersCount = 0;
                let updatedVotesCount = 0;

                // 步驟 1：更新每個使用者的資料
                for (const user of data.data || []) {
                    let needUpdate = false;
                    
                    // 處理喜歡的遊戲
                    if (user.liked_games && user.liked_games.length > 0) {
                        const updated = user.liked_games.map(game => 
                            selectedGames.has(game) ? primaryName : game
                        );
                        // 去重
                        user.liked_games = [...new Set(updated)];
                        needUpdate = true;
                    }

                    // 處理不喜歡的遊戲
                    if (user.disliked_games && user.disliked_games.length > 0) {
                        const updated = user.disliked_games.map(game => 
                            selectedGames.has(game) ? primaryName : game
                        );
                        user.disliked_games = [...new Set(updated)];
                        needUpdate = true;
                    }

                    // 處理普普的遊戲
                    if (user.neutral_games && user.neutral_games.length > 0) {
                        const updated = user.neutral_games.map(game => 
                            selectedGames.has(game) ? primaryName : game
                        );
                        user.neutral_games = [...new Set(updated)];
                        needUpdate = true;
                    }

                    // 處理願望清單
                    if (user.wishlist && user.wishlist.length > 0) {
                        const updated = user.wishlist.map(game => 
                            selectedGames.has(game) ? primaryName : game
                        );
                        user.wishlist = [...new Set(updated)];
                        needUpdate = true;
                    }

                    // 更新資料庫
                    if (needUpdate) {
                        await fetch(`tables/users/${user.id}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(user)
                        });
                        updatedUsersCount++;
                    }
                }

                // 步驟 2：更新 game_votes 資料表
                try {
                    const votesResponse = await fetch('tables/game_votes?limit=10000');
                    const votesData = await votesResponse.json();
                    
                    for (const vote of votesData.data || []) {
                        // 檢查該投票的遊戲名稱是否在要合併的名稱中
                        if (selectedGames.has(vote.game_name)) {
                            // 更新為主要名稱
                            vote.game_name = primaryName;
                            
                            await fetch(`tables/game_votes/${vote.id}`, {
                                method: 'PUT',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(vote)
                            });
                            updatedVotesCount++;
                        }
                    }
                } catch (voteError) {
                    console.warn('更新投票資料時發生錯誤（非致命）:', voteError);
                }

                // 步驟 3：更新 game_collections 資料表
                let updatedCollectionsCount = 0;
                try {
                    const collectionsResponse = await fetch('tables/game_collections?limit=1000');
                    const collectionsData = await collectionsResponse.json();
                    
                    for (const collection of collectionsData.data || []) {
                        if (collection.games && collection.games.length > 0) {
                            let needUpdate = false;
                            const updatedGames = collection.games.map(game => {
                                if (selectedGames.has(game)) {
                                    needUpdate = true;
                                    return primaryName;
                                }
                                return game;
                            });
                            
                            // 去重
                            collection.games = [...new Set(updatedGames)];
                            
                            if (needUpdate) {
                                await fetch(`tables/game_collections/${collection.id}`, {
                                    method: 'PUT',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify(collection)
                                });
                                updatedCollectionsCount++;
                            }
                        }
                    }
                } catch (collectionError) {
                    console.warn('更新清單資料時發生錯誤（非致命）:', collectionError);
                }

                // 步驟 4：更新 game_aliases 資料表
                let updatedAliasesCount = 0;
                try {
                    const aliasesResponse = await fetch('tables/game_aliases?limit=10000');
                    const aliasesData = await aliasesResponse.json();
                    
                    for (const alias of aliasesData.data || []) {
                        let needUpdate = false;
                        
                        // 檢查主要名稱是否需要更新
                        if (selectedGames.has(alias.primary_name)) {
                            alias.primary_name = primaryName;
                            needUpdate = true;
                        }
                        
                        // 檢查別名陣列是否需要更新
                        if (alias.aliases && alias.aliases.length > 0) {
                            const updatedAliases = alias.aliases.map(aliasName => 
                                selectedGames.has(aliasName) ? primaryName : aliasName
                            );
                            // 去重
                            alias.aliases = [...new Set(updatedAliases)];
                            needUpdate = true;
                        }
                        
                        if (needUpdate) {
                            alias.updated_at = new Date().toISOString();
                            await fetch(`tables/game_aliases/${alias.id}`, {
                                method: 'PUT',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(alias)
                            });
                            updatedAliasesCount++;
                        }
                    }
                } catch (aliasError) {
                    console.warn('更新別名資料時發生錯誤（非致命）:', aliasError);
                }

                const mergedNames = selectedGames.has(primaryName) ? otherNames : Array.from(selectedGames);
                alert(`✅ 成功合併！\n\n📊 更新統計：\n• ${updatedUsersCount} 位使用者的資料\n• ${updatedVotesCount} 筆投票記錄\n• ${updatedCollectionsCount} 個主題清單\n• ${updatedAliasesCount} 個別名記錄\n\n🎯 主要名稱：${primaryName}\n🔗 合併的名稱：${mergedNames.join(', ')}`);

                // 重新載入
                clearSelection();
                await loadGames();

            } catch (error) {
                console.error('合併失敗:', error);
                alert('❌ 合併失敗：' + error.message);
            } finally {
                document.getElementById('merge-btn').disabled = false;
                document.getElementById('merge-btn').textContent = '🔗 合併選中的名稱';
            }
        }

        // 頁面載入時執行
        document.addEventListener('DOMContentLoaded', loadGames);
    </script>
</body>
</html>
