<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛡️ 管理員守護者徽章授予工具</title>
<style>
  :root {
    --bg: #0f172a; --card: #1e293b; --border: #334155;
    --text: #e2e8f0; --muted: #94a3b8;
    --primary: #6366f1; --success: #10b981; --warn: #f59e0b; --danger: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif;
         min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 860px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 0.4rem; }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 0.75rem;
          padding: 1.5rem; margin-bottom: 1.25rem; }
  .card-title { font-size: 1rem; font-weight: 700; margin-bottom: 1rem;
                display: flex; align-items: center; gap: 0.5rem; }
  .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1.25rem;
         border-radius: 0.5rem; border: none; cursor: pointer; font-size: 0.9rem;
         font-weight: 600; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-warn    { background: var(--warn); color: #000; }
  .status-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem;
                border-radius: 0.5rem; background: var(--bg); margin-bottom: 0.5rem;
                flex-wrap: wrap; }
  .status-badge { font-size: 0.72rem; font-weight: 600; padding: 0.2rem 0.55rem;
                  border-radius: 0.4rem; }
  .badge-ok    { background: #10b98120; color: var(--success); border: 1px solid #10b98140; }
  .badge-miss  { background: #f59e0b20; color: var(--warn); border: 1px solid #f59e0b40; }
  .badge-nostat{ background: #ef444420; color: var(--danger); border: 1px solid #ef444440; }
  .badge-done  { background: #6366f120; color: var(--primary); border: 1px solid #6366f140; }
  .name { font-weight: 600; font-size: 0.95rem; }
  .email { color: var(--muted); font-size: 0.8rem; }
  .log { background: #0f172a; border: 1px solid var(--border); border-radius: 0.5rem;
         padding: 1rem; font-family: monospace; font-size: 0.78rem; line-height: 1.7;
         max-height: 300px; overflow-y: auto; margin-top: 1rem; }
  .log-ok   { color: var(--success); }
  .log-warn { color: var(--warn); }
  .log-err  { color: var(--danger); }
  .log-info { color: var(--muted); }
  .summary { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .summary-item { background: var(--bg); border-radius: 0.5rem; padding: 0.65rem 1.1rem;
                  text-align: center; flex: 1; min-width: 100px; }
  .summary-num { font-size: 1.8rem; font-weight: 700; line-height: 1; }
  .summary-label { font-size: 0.72rem; color: var(--muted); margin-top: 0.2rem; }
  #progress-bar-wrap { background: var(--border); border-radius: 1rem; height: 8px;
                       margin: 0.75rem 0; overflow: hidden; display: none; }
  #progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--success));
                  border-radius: 1rem; width: 0%; transition: width 0.3s ease; }
</style>
</head>
<body>
<div class="container">
  <h1>🛡️ 守護者徽章授予工具</h1>
  <p class="subtitle">掃描 admin_whitelist，將 <code>badge_admin</code>（守護者）成就寫入所有管理員的 user_stats。</p>

  <!-- 摘要 -->
  <div class="card">
    <div class="card-title">📊 狀態摘要</div>
    <div class="summary">
      <div class="summary-item">
        <div class="summary-num" id="sum-admins">-</div>
        <div class="summary-label">管理員人數</div>
      </div>
      <div class="summary-item">
        <div class="summary-num" id="sum-has">-</div>
        <div class="summary-label">已有守護者</div>
      </div>
      <div class="summary-item">
        <div class="summary-num" id="sum-miss">-</div>
        <div class="summary-label">尚未授予</div>
      </div>
      <div class="summary-item">
        <div class="summary-num" id="sum-nostat">-</div>
        <div class="summary-label">找不到 Stats</div>
      </div>
    </div>
    <div style="display:flex; gap:0.75rem; flex-wrap:wrap;">
      <button class="btn btn-primary" id="btn-scan" onclick="scanAdmins()">🔍 掃描狀態</button>
      <button class="btn btn-success" id="btn-grant" onclick="grantAll()" disabled>✅ 批量授予守護者</button>
    </div>
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div id="status-msg" style="font-size:0.85rem; color:var(--muted); margin-top:0.5rem;"></div>
  </div>

  <!-- 管理員列表 -->
  <div class="card">
    <div class="card-title">👥 管理員列表</div>
    <div id="admin-list">
      <div style="color:var(--muted); font-size:0.85rem; text-align:center; padding:2rem;">
        點「掃描狀態」載入
      </div>
    </div>
  </div>

  <!-- 操作日誌 -->
  <div class="card">
    <div class="card-title">📋 操作日誌</div>
    <div class="log" id="log">等待操作...</div>
  </div>
</div>

<script>
// ── 全域資料 ──
let adminList = [];         // admin_whitelist 的資料
let allUsers = [];          // users 表
let allStats = [];          // user_stats 表
let badgeAdminId = 'badge_admin'; // 成就 ID
let scanResult = [];        // 掃描結果

function log(msg, type = 'info') {
  const el = document.getElementById('log');
  const cls = { ok: 'log-ok', warn: 'log-warn', err: 'log-err', info: 'log-info' }[type] || 'log-info';
  const time = new Date().toLocaleTimeString('zh-TW');
  el.innerHTML += `<div class="${cls}">[${time}] ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

function setStatus(msg) {
  document.getElementById('status-msg').textContent = msg;
}

function setProgress(pct) {
  const wrap = document.getElementById('progress-bar-wrap');
  wrap.style.display = pct > 0 ? 'block' : 'none';
  document.getElementById('progress-bar').style.width = pct + '%';
}

// ── 掃描管理員 ──
async function scanAdmins() {
  const btn = document.getElementById('btn-scan');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';
  log('開始掃描...', 'info');
  setStatus('載入資料中...');

  try {
    // 1. 取得 achievements 確認 badge_admin 存在
    log('① 查詢 achievements 表...', 'info');
    const achRes = await fetch('tables/achievements?limit=200');
    const achData = await achRes.json();
    const badgeAdminAch = (achData.data || []).find(a => a.id === 'badge_admin');
    if (!badgeAdminAch) {
      log('❌ achievements 表中找不到 id="badge_admin" 的成就！請先建立此成就。', 'err');
      setStatus('❌ 找不到 badge_admin 成就定義');
      btn.disabled = false;
      renderAdminList([]);
      return;
    }
    log(`✅ 找到成就：「${badgeAdminAch.name_zh}」（${badgeAdminAch.description}）`, 'ok');

    // 2. 取得 admin_whitelist
    log('② 查詢 admin_whitelist 表...', 'info');
    const adminRes = await fetch('tables/admin_whitelist?limit=200');
    const adminData = await adminRes.json();
    adminList = (adminData.data || []).filter(a => a.is_active !== false);
    log(`✅ 找到 ${adminList.length} 位啟用中的管理員`, 'ok');

    if (adminList.length === 0) {
      log('⚠️ 沒有任何啟用中的管理員', 'warn');
      setStatus('沒有管理員');
      btn.disabled = false;
      renderAdminList([]);
      return;
    }

    // 3. 取得 users（用 google_id 對應）
    log('③ 查詢 users 表...', 'info');
    const usersRes = await fetch('tables/users?limit=1000');
    const usersData = await usersRes.json();
    allUsers = usersData.data || [];
    log(`✅ 取得 ${allUsers.length} 位使用者`, 'ok');

    // 4. 取得 user_stats
    log('④ 查詢 user_stats 表...', 'info');
    const statsRes = await fetch('tables/user_stats?limit=1000');
    const statsData = await statsRes.json();
    allStats = statsData.data || [];
    log(`✅ 取得 ${allStats.length} 筆 stats`, 'ok');

    // 5. 比對每位管理員
    scanResult = adminList.map(admin => {
      // 找到對應的 user（by google_id）
      const user = allUsers.find(u => u.google_id === admin.google_id);
      if (!user) {
        return { admin, user: null, stats: null, hasBadge: false, statusCode: 'no_user' };
      }
      // 找到對應的 stats
      const stats = allStats.find(s => s.user_id === user.id);
      if (!stats) {
        return { admin, user, stats: null, hasBadge: false, statusCode: 'no_stats' };
      }
      // 檢查是否已有 badge_admin
      const unlocked = Array.isArray(stats.unlocked_badges)
        ? stats.unlocked_badges
        : (() => { try { return JSON.parse(stats.unlocked_badges || '[]'); } catch(e) { return []; } })();
      const hasBadge = unlocked.includes('badge_admin');
      return { admin, user, stats, hasBadge, unlockedArr: unlocked, statusCode: hasBadge ? 'has_badge' : 'missing' };
    });

    // 6. 更新摘要
    const hasCount   = scanResult.filter(r => r.statusCode === 'has_badge').length;
    const missCount  = scanResult.filter(r => r.statusCode === 'missing').length;
    const noStat     = scanResult.filter(r => r.statusCode === 'no_stats' || r.statusCode === 'no_user').length;
    document.getElementById('sum-admins').textContent = adminList.length;
    document.getElementById('sum-has').textContent    = hasCount;
    document.getElementById('sum-miss').textContent   = missCount;
    document.getElementById('sum-nostat').textContent = noStat;

    log(`📊 結果：已有 ${hasCount} 人、缺少 ${missCount} 人、找不到 Stats ${noStat} 人`, 'info');
    setStatus(missCount > 0 ? `⚠️ 有 ${missCount} 位管理員尚未獲得守護者徽章` : '✅ 所有管理員都已有守護者徽章');

    // 啟用授予按鈕
    document.getElementById('btn-grant').disabled = (missCount === 0);
    renderAdminList(scanResult);

  } catch (e) {
    log('❌ 掃描失敗：' + e.message, 'err');
    setStatus('❌ 發生錯誤');
  }

  btn.disabled = false;
}

// ── 渲染管理員列表 ──
function renderAdminList(results) {
  const el = document.getElementById('admin-list');
  if (results.length === 0) {
    el.innerHTML = '<div style="color:var(--muted); text-align:center; padding:1.5rem; font-size:0.85rem;">無資料</div>';
    return;
  }

  const statusLabel = {
    has_badge: ['✅ 已解鎖', 'badge-ok'],
    missing:   ['⚠️ 尚未授予', 'badge-miss'],
    no_stats:  ['❌ 無 Stats', 'badge-nostat'],
    no_user:   ['❌ 找不到使用者', 'badge-nostat'],
    granted:   ['🎉 剛授予', 'badge-done'],
  };

  el.innerHTML = results.map(r => {
    const [label, cls] = statusLabel[r.statusCode] || ['❓ 未知', 'badge-nostat'];
    const nameDisplay = r.user?.username || r.admin.nickname || r.admin.email || '（無名稱）';
    const emailDisplay = r.admin.email || '';
    const roleDisplay = r.admin.role === 'super_admin' ? '⭐ 超級管理員' : '🛡️ 管理員';
    return `
      <div class="status-row" id="row-${r.admin.id}">
        <span class="status-badge ${cls}">${label}</span>
        <div style="flex:1; min-width:150px;">
          <div class="name">${nameDisplay} <span style="font-size:0.72rem; color:var(--muted);">${roleDisplay}</span></div>
          <div class="email">${emailDisplay}</div>
        </div>
        <div style="font-size:0.75rem; color:var(--muted);">
          google_id: <code>${r.admin.google_id || '—'}</code>
        </div>
      </div>`;
  }).join('');
}

// ── 批量授予 ──
async function grantAll() {
  const btn = document.getElementById('btn-grant');
  btn.disabled = true;
  document.getElementById('btn-scan').disabled = true;

  const missing = scanResult.filter(r => r.statusCode === 'missing');
  log(`🚀 開始授予 ${missing.length} 位管理員守護者徽章...`, 'info');
  setProgress(0);

  let done = 0, failed = 0;

  for (let i = 0; i < missing.length; i++) {
    const r = missing[i];
    const pct = Math.round(((i) / missing.length) * 100);
    setProgress(pct);
    setStatus(`授予中... ${i + 1} / ${missing.length}`);

    const nameDisplay = r.user?.username || r.admin.nickname || r.admin.email;
    log(`  授予「${nameDisplay}」...`, 'info');

    try {
      // 更新 unlocked_badges，把 badge_admin 加入
      const newBadges = [...(r.unlockedArr || []), 'badge_admin'];
      const patchRes = await fetch(`tables/user_stats/${r.stats.id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          unlocked_badges: newBadges,
          updated_at: Date.now()
        })
      });

      if (patchRes.ok) {
        log(`  ✅ 成功授予：${nameDisplay}`, 'ok');
        done++;
        // 更新掃描結果狀態
        r.statusCode = 'granted';
        // 更新列表中該行
        const row = document.getElementById(`row-${r.admin.id}`);
        if (row) {
          row.querySelector('.status-badge').className = 'status-badge badge-done';
          row.querySelector('.status-badge').textContent = '🎉 剛授予';
        }
      } else {
        const errText = await patchRes.text().catch(() => '');
        log(`  ❌ 失敗（HTTP ${patchRes.status}）：${nameDisplay} — ${errText}`, 'err');
        failed++;
      }
    } catch (e) {
      log(`  ❌ 例外錯誤：${nameDisplay} — ${e.message}`, 'err');
      failed++;
    }

    // 小延遲避免衝擊 API
    await new Promise(res => setTimeout(res, 200));
  }

  setProgress(100);
  setTimeout(() => setProgress(0), 1500);

  const msg = `完成！成功 ${done} 人，失敗 ${failed} 人`;
  log('📊 ' + msg, done > 0 ? 'ok' : 'warn');
  setStatus(done > 0 ? `✅ ${msg}` : `⚠️ ${msg}`);

  // 更新摘要
  document.getElementById('sum-has').textContent  = parseInt(document.getElementById('sum-has').textContent || 0) + done;
  document.getElementById('sum-miss').textContent = Math.max(0, missing.length - done);

  document.getElementById('btn-scan').disabled = false;
  btn.disabled = true; // 授予完畢不需再按
}
</script>
</body>
</html>
