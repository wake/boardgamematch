<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"><title>修正 badge_admin rarity</title></head>
<body>
<div style="font-family:sans-serif;max-width:600px;margin:2rem auto;padding:1rem;">
<h2>🔧 查詢並修正 badge_admin 的 rarity</h2>
<div id="log" style="background:#f0f0f0;padding:1rem;border-radius:0.5rem;font-family:monospace;white-space:pre-wrap;"></div>
<button onclick="run()" style="margin-top:1rem;padding:0.75rem 1.5rem;background:#667eea;color:white;border:none;border-radius:0.5rem;cursor:pointer;">▶️ 執行修正</button>
</div>
<script>
function log(msg){ document.getElementById('log').textContent += msg + '\n'; }
async function run(){
    document.getElementById('log').textContent = '';
    // 取得所有成就
    const res = await fetch('tables/achievements?limit=200');
    const data = await res.json();
    const all = data.data || [];
    const ba = all.find(a => a.id === 'badge_admin');
    if(!ba){ log('❌ 找不到 badge_admin'); return; }
    log(`找到：id=${ba.id}, name_zh=${ba.name_zh}, rarity=${ba.rarity}`);
    if(ba.rarity === 'legendary'){ log('✅ 已經是 legendary，不需修正'); return; }
    // PATCH rarity
    const r = await fetch(`tables/achievements/${ba.id}`, {
        method:'PATCH',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ rarity: 'legendary' })
    });
    if(r.ok){ log('✅ 已修正為 legendary！'); }
    else { log('❌ 修正失敗：' + r.status); }
}
</script>
</body>
</html>
