<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>清理舊成就 v2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; padding: 1.5rem; background: #0f0f1a; color: #e2e8f0; font-size: 0.85rem; line-height: 2; }
h2 { color: #7dd3fc; margin-bottom: 0.5rem; }
p.desc { color: #94a3b8; margin-bottom: 1rem; font-size: 0.8rem; }
button { padding: 0.65rem 1.5rem; border: none; border-radius: 0.5rem; font-size: 0.9rem; cursor: pointer; font-weight: 600; margin-right: 0.5rem; margin-bottom: 1rem; }
.btn-scan   { background: linear-gradient(135deg,#667eea,#764ba2); color:#fff; }
.btn-delete { background: linear-gradient(135deg,#ef4444,#b91c1c); color:#fff; }
button:disabled { opacity:0.4; cursor:not-allowed; }
.ok   { color:#4ade80; } .err  { color:#f87171; }
.warn { color:#fbbf24; } .info { color:#93c5fd; }
.raw  { background:#1e293b; padding:0.1rem 0.4rem; border-radius:0.2rem; }
hr    { border:none; border-top:1px solid #1e293b; margin:0.5rem 0; }
</style>
</head>
<body>
<h2>🧹 成就資料庫清理工具 v2</h2>
<p class="desc">掃描資料庫中重複的成就（同一個 achievement id 有多筆），保留最新版，刪除舊版。</p>
<button class="btn-scan"   id="btn-scan"   onclick="scan()">🔍 掃描</button>
<button class="btn-delete" id="btn-delete" onclick="doDelete()" disabled>🗑 執行刪除</button>
<div id="log">請按「掃描」...</div>

<script>
const log = document.getElementById('log');
const add = (m, c='') => { log.innerHTML += `<div class="${c}">${m}</div>`; };
let _toDelete = [];

async function scan() {
  log.innerHTML = '';
  _toDelete = [];
  document.getElementById('btn-delete').disabled = true;
  document.getElementById('btn-scan').disabled = true;
  add('🔍 掃描中...', 'info');

  // 抓所有成就
  const r = await fetch('tables/achievements?limit=500');
  const d = await r.json();
  const all = (d.data || []);
  add(`資料庫共 <b>${all.length}</b> 筆成就`);

  // 按 achievement_id (= a.id 欄位) 分組
  // 注意：table 的 pk 是 db_id（系統 uuid），a.id 是我們自己定義的 badge id
  // 但本系統 pk = id，自訂 badge id 也叫 id... 先列出全部看看
  add('<hr><b class="info">全部成就列表（依建立時間排序）：</b>');

  // 先依建立時間排序
  all.sort((a,b) => (a.created_at||0) - (b.created_at||0));

  // 顯示每筆，標示年份
  all.forEach(a => {
    const ts = a.created_at;
    let dateStr = '無日期';
    let yr = 0;
    if (ts) {
      const dt = new Date(Number(ts));
      dateStr = dt.toLocaleDateString('zh-TW');
      yr = dt.getFullYear();
    }
    const isOld = yr > 0 && yr < 2026;
    add(`  ${isOld ? '⚠️' : '✅'} <span class="raw">${a.id}</span>  ${a.name_zh}  (${a.unlock_type}/${a.unlock_value})  建立:${dateStr}`, isOld ? 'warn' : 'ok');
  });

  add('<hr>');

  // 找重複：同一個 id 出現超過 1 次
  const byId = {};
  all.forEach(a => {
    if (!byId[a.id]) byId[a.id] = [];
    byId[a.id].push(a);
  });

  let dupGroups = 0;
  Object.entries(byId).forEach(([id, list]) => {
    if (list.length <= 1) return;
    dupGroups++;
    // 保留最新（created_at 最大）
    list.sort((a,b) => (b.created_at||0) - (a.created_at||0));
    add(`⚠️ id <span class="raw">${id}</span> 有 ${list.length} 筆重複`, 'warn');
    list.forEach((a, i) => {
      const dt = a.created_at ? new Date(Number(a.created_at)).toLocaleDateString('zh-TW') : '無日期';
      if (i === 0) {
        add(`   ✅ 保留（最新）：系統id=${a.id}　name=${a.name_zh}　建立:${dt}`, 'ok');
      } else {
        add(`   🗑 待刪除：系統id=${a.id}　name=${a.name_zh}　建立:${dt}`, 'err');
        _toDelete.push(a);
      }
    });
  });

  // 另外：找 2025 年且 id 不屬於新版 25 個的（完全是舊系統殘留）
  const newIds = new Set([
    'badge_first_game','badge_games_5','badge_games_10','badge_games_25',
    'badge_games_50','badge_games_100','badge_first_vote','badge_votes_10',
    'badge_votes_25','badge_votes_50','badge_votes_100','badge_streak_3',
    'badge_streak_7','badge_streak_14','badge_streak_30','badge_streak_60',
    'badge_collection_1','badge_collection_3','badge_collection_5',
    'badge_rated_others_1','badge_rated_others_5','badge_rated_others_20',
    'badge_early_bird','badge_mbti_done','badge_admin',
  ]);

  const orphans = all.filter(a => {
    if (_toDelete.some(d => d.id === a.id)) return false; // 已在待刪
    const ts = a.created_at;
    if (!ts) return false;
    const yr = new Date(Number(ts)).getFullYear();
    return yr < 2026 && !newIds.has(a.id);
  });

  if (orphans.length > 0) {
    add('<hr>');
    add(`⚠️ 另發現 ${orphans.length} 筆 2025 年的舊成就（id 不在新版清單中）：`, 'warn');
    orphans.forEach(a => {
      const dt = a.created_at ? new Date(Number(a.created_at)).toLocaleDateString('zh-TW') : '無日期';
      add(`   🗑 舊成就：<span class="raw">${a.id}</span>  ${a.name_zh}  建立:${dt}`, 'err');
      _toDelete.push(a);
    });
  }

  // 去重（避免同一筆重複加入）
  _toDelete = _toDelete.filter((a, i, arr) => arr.findIndex(x => x.id === a.id) === i);

  add('<hr>');
  if (_toDelete.length === 0) {
    add('✅ 無需清理，資料庫已乾淨', 'ok');
  } else {
    add(`⚠️ 共需刪除 <b>${_toDelete.length}</b> 筆舊成就 → 請按「執行刪除」`, 'warn');
    document.getElementById('btn-delete').disabled = false;
  }

  document.getElementById('btn-scan').disabled = false;
}

async function doDelete() {
  if (!_toDelete.length) return;
  document.getElementById('btn-delete').disabled = true;
  add('<hr><b class="warn">🗑 刪除中...</b>');

  let ok = 0, fail = 0;
  for (const a of _toDelete) {
    try {
      const r = await fetch(`tables/achievements/${a.id}`, { method: 'DELETE' });
      if (r.ok || r.status === 204) {
        add(`  ✅ 刪除成功：${a.name_zh} (${a.id})`, 'ok');
        ok++;
      } else {
        add(`  ❌ 失敗 HTTP ${r.status}：${a.name_zh}`, 'err');
        fail++;
      }
    } catch(e) {
      add(`  ❌ 錯誤：${e.message}`, 'err');
      fail++;
    }
  }

  add('<hr>');
  add(`完成：成功 ${ok} 筆、失敗 ${fail} 筆`, fail === 0 ? 'ok' : 'warn');
  if (ok > 0) {
    add('✅ 請重新整理「我的檔案」頁面，成就顯示應已正常！', 'ok');
    add('如仍有問題，可再按「掃描」確認', 'info');
  }
  document.getElementById('btn-scan').disabled = false;
}
</script>
</body>
</html>
