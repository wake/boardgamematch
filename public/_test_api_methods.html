<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>API 方法測試</title>
<style>
body { font-family: monospace; padding: 2rem; background: #1a1a2e; color: #eee; }
button { margin: 0.5rem; padding: 0.6rem 1.2rem; background: #4a4a8a; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
button:hover { background: #6a6ab0; }
#log { background: #0d0d1a; padding: 1rem; border-radius: 8px; margin-top: 1rem; min-height: 200px; white-space: pre-wrap; font-size: 13px; line-height: 1.6; }
.ok { color: #4ade80; }
.err { color: #f87171; }
.info { color: #60a5fa; }
input { background: #2a2a4a; color: white; border: 1px solid #4a4a8a; padding: 0.4rem 0.8rem; border-radius: 4px; width: 400px; }
</style>
</head>
<body>
<h2>🔬 Genspark API 方法測試</h2>
<p>自動找一筆 users 資料，測試 PUT / PATCH / POST(id) / POST(base) 哪個能成功更新</p>

<div style="margin-bottom:1rem">
  <label>User ID（留空自動抓第一筆）：</label><br>
  <input type="text" id="userId" placeholder="例：a436dfbd-22c0-4cf8-9024-456b829ed176">
</div>

<button onclick="runTest()">🚀 開始測試所有方法</button>
<button onclick="document.getElementById('log').textContent=''">清空</button>

<div id="log">等待測試...</div>

<script>
const log = (msg, cls='') => {
    const el = document.getElementById('log');
    const line = document.createElement('span');
    line.className = cls;
    line.textContent = msg + '\n';
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
};

async function runTest() {
    document.getElementById('log').textContent = '';
    log('=== 開始測試 ===', 'info');
    
    // 1. 取得測試用的 user
    let userId = document.getElementById('userId').value.trim();
    let userData;
    
    try {
        log('📡 GET tables/users ...', 'info');
        const r = await fetch('tables/users?limit=1');
        const d = await r.json();
        if (!userId) {
            userData = d.data?.[0];
            userId = userData?.id;
        } else {
            const r2 = await fetch(`tables/users/${userId}`);
            userData = await r2.json();
        }
        log(`✅ 找到 user: ${userId}`, 'ok');
        log(`   username: ${userData.username}`, 'info');
    } catch(e) {
        log('❌ 取得 user 失敗: ' + e.message, 'err');
        return;
    }
    
    // 清除系統欄位
    const sys = ['gs_project_id','gs_table_name','gs_created_at','gs_updated_at',
                 'created_at','updated_at','deleted','_rid','_id','__rid','__id'];
    const cleaned = Object.fromEntries(Object.entries(userData).filter(([k]) => !sys.includes(k)));
    const testPayload = { ...cleaned, _test_flag: Date.now() };
    
    log('\n--- 測試 PUT tables/users/{id} ---', 'info');
    try {
        const r = await fetch(`tables/users/${userId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(testPayload)
        });
        const body = await r.text();
        if (r.ok) log(`✅ PUT 成功！HTTP ${r.status}`, 'ok');
        else log(`❌ PUT 失敗 HTTP ${r.status}: ${body.slice(0,200)}`, 'err');
    } catch(e) { log('❌ PUT 例外: ' + e.message, 'err'); }
    
    log('\n--- 測試 PATCH tables/users/{id} (只送一個欄位) ---', 'info');
    try {
        const r = await fetch(`tables/users/${userId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ _test_flag: Date.now() })
        });
        const body = await r.text();
        if (r.ok) log(`✅ PATCH 成功！HTTP ${r.status}`, 'ok');
        else log(`❌ PATCH 失敗 HTTP ${r.status}: ${body.slice(0,200)}`, 'err');
    } catch(e) { log('❌ PATCH 例外: ' + e.message, 'err'); }
    
    log('\n--- 測試 POST tables/users (body 帶 id = UPSERT?) ---', 'info');
    try {
        const r = await fetch('tables/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(testPayload)
        });
        const body = await r.text();
        if (r.ok) log(`✅ POST(base+id) 成功！HTTP ${r.status}`, 'ok');
        else log(`❌ POST(base+id) 失敗 HTTP ${r.status}: ${body.slice(0,300)}`, 'err');
    } catch(e) { log('❌ POST(base+id) 例外: ' + e.message, 'err'); }

    log('\n--- 測試 PUT tables/users/{id} (不帶系統欄位，只送 bio) ---', 'info');
    try {
        const minPayload = { id: userId, bio: userData.bio || '' };
        const r = await fetch(`tables/users/${userId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(minPayload)
        });
        const body = await r.text();
        if (r.ok) log(`✅ PUT(minimal) 成功！HTTP ${r.status}`, 'ok');
        else log(`❌ PUT(minimal) 失敗 HTTP ${r.status}: ${body.slice(0,300)}`, 'err');
    } catch(e) { log('❌ PUT(minimal) 例外: ' + e.message, 'err'); }
    
    log('\n=== 測試完成 ===', 'info');
}
</script>
</body>
</html>
