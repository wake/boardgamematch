<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>BGG Jina Debug</title>
    <style>
        body { font-family: monospace; padding: 2rem; background: #1e1e2e; color: #cdd6f4; }
        input { padding: 0.5rem; font-size: 1rem; width: 200px; background: #313244; color: #cdd6f4; border: 1px solid #555; border-radius: 0.4rem; }
        button { padding: 0.5rem 1.2rem; background: #667eea; color: white; border: none; border-radius: 0.4rem; cursor: pointer; font-size: 1rem; margin-left: 0.5rem; }
        #raw { white-space: pre-wrap; word-break: break-all; background: #181825; padding: 1rem; border-radius: 0.5rem; max-height: 600px; overflow-y: auto; font-size: 0.8rem; margin-top: 1rem; }
        .found { color: #a6e3a1; font-size: 1rem; margin-top: 1rem; }
        .notfound { color: #f38ba8; }
    </style>
</head>
<body>
<h2 style="color:#cba6f7;">BGG Jina 原始回應 Debug</h2>
<div>
    <input id="bgg-id" placeholder="BGG ID，如 174430" value="174430">
    <button onclick="doFetch()">抓取並顯示原始回應</button>
</div>
<div id="found-urls" class="found"></div>
<div id="raw">（點擊按鈕後顯示原始內容）</div>

<script>
async function doFetch() {
    const id = document.getElementById('bgg-id').value.trim();
    document.getElementById('raw').textContent = '⏳ 抓取中...';
    document.getElementById('found-urls').textContent = '';
    try {
        const res = await fetch(`https://r.jina.ai/https://boardgamegeek.com/boardgame/${id}`, {
            headers: { 'X-No-Cache': 'true' }
        });
        const text = await res.text();

        // 顯示原始內容
        document.getElementById('raw').textContent = text;

        // 嘗試各種正則找圖片
        const patterns = [
            /https?:\/\/cf\.geekdo-images\.com\/[^\s"')\]]+/gi,
            /https?:\/\/[^\s"')\]]+\.(?:jpg|png|jpeg|webp)/gi,
            /geekdo-images[^\s"')\]]+/gi,
            /"image"\s*:\s*"([^"]+)"/gi,
            /src="([^"]+geekdo[^"]+)"/gi,
        ];

        let foundHtml = '<b>找到的圖片 URL：</b><br>';
        let anyFound = false;
        for (const pat of patterns) {
            const matches = [...text.matchAll(pat)];
            if (matches.length > 0) {
                anyFound = true;
                foundHtml += `<br><span style="color:#fab387;">Pattern: ${pat}</span><br>`;
                matches.slice(0,5).forEach(m => {
                    foundHtml += `→ ${m[0] || m[1]}<br>`;
                });
            }
        }
        if (!anyFound) foundHtml += '<span class="notfound">❌ 所有正則都找不到圖片！</span>';
        document.getElementById('found-urls').innerHTML = foundHtml;

    } catch(e) {
        document.getElementById('raw').textContent = '❌ 錯誤：' + e.message;
    }
}
</script>
</body>
</html>
