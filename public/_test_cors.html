<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head>
<body>
<pre id="out" style="font-size:13px;padding:20px;white-space:pre-wrap;"></pre>
<script>
const log = s => { document.getElementById('out').textContent += s + '\n'; console.log(s); };
(async () => {
    log('從 ' + location.origin + ' 跨域請求 gensparkspace.com...');
    try {
        const r = await fetch('https://zvetfxkm.gensparkspace.com/tables/users?limit=1');
        log('✅ GET status: ' + r.status);
        log('Access-Control-Allow-Origin: ' + (r.headers.get('access-control-allow-origin') || '(無)'));
        const d = await r.json();
        log('total users: ' + d.total);
    } catch(e) {
        log('❌ ERROR: ' + e.message);
        log('（若出現 CORS error 表示跨域被擋）');
    }
})();
</script>
</body></html>
