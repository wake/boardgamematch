<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Debug Lookup</title></head>
<body>
<h2>GameNames Lookup 測試</h2>
<div id="result">載入中...</div>
<script src="js/game-names.js"></script>
<script>
(async () => {
    const log = msg => {
        const div = document.createElement('div');
        div.textContent = msg;
        document.getElementById('result').appendChild(div);
        console.log(msg);
    };

    log('⏳ 開始載入 GameNames...');
    await GameNames.load();
    log('✅ GameNames 載入完成');

    // 測試別名
    const tests = ['黃銅', '工業革命: 伯明翰', 'Ants', 'ANTS', '詭鎮奇談'];
    for (const name of tests) {
        const info = GameNames.lookup(name);
        if (info) {
            log(`✅ lookup('${name}') => name_zh='${info.name_zh}', name_en='${info.name_en}', bgg_id='${info.bgg_id}'`);
        } else {
            log(`❌ lookup('${name}') => null（找不到）`);
        }
    }

    // 測試 formatTag
    log('--- formatTag 測試 ---');
    for (const name of tests) {
        const html = GameNames.formatTag(name);
        log(`formatTag('${name}') => ${html}`);
    }

    // 檢查 nameMap 中是否有 '黃銅'
    const nm = GameNames._nameMap;
    log(`nameMap key '黃銅' exists: ${!!nm['黃銅']}`);
    log(`nameMap key '工業革命: 伯明翰' exists: ${!!nm['工業革命: 伯明翰']}`);
    if (nm['黃銅']) {
        log(`nameMap['黃銅'] = ${JSON.stringify(nm['黃銅'])}`);
    }
})();
</script>
</body>
</html>
