<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>更新 Ev02/Ev03 簡介</title>
<script src="js/admin-auth.js?v=20240222-fix"></script>
</head>
<body>
<div id="app" style="font-family:sans-serif;max-width:700px;margin:2rem auto;padding:1rem;">
<h2>🔧 查找並更新 Ev02 / Ev03 簡介</h2>
<p>將所有暱稱/帳號含 <code>Ev02</code> 或 <code>Ev03</code> 的玩家簡介設為「Ev01的測試機器人」</p>
<button onclick="run()" style="padding:0.75rem 1.5rem;background:#667eea;color:white;border:none;border-radius:0.5rem;cursor:pointer;font-size:1rem;">▶️ 執行</button>
<pre id="log" style="margin-top:1.5rem;background:#f0f0f0;padding:1rem;border-radius:0.5rem;min-height:100px;overflow-y:auto;max-height:400px;white-space:pre-wrap;"></pre>
</div>
<script>
function log(msg) {
    document.getElementById('log').textContent += msg + '\n';
}

async function run() {
    document.getElementById('log').textContent = '開始執行...\n';
    try {
        const res = await fetch('tables/users?limit=500');
        const data = await res.json();
        const users = data.data || [];
        log(`共 ${users.length} 位玩家`);

        // 搜尋欄位：username, nickname, email
        const targets = users.filter(u => {
            const fields = [
                u.username || '',
                u.nickname || '',
                u.email || ''
            ].map(f => f.toLowerCase());
            return fields.some(f => f.includes('ev02') || f.includes('ev03'));
        });

        if (targets.length === 0) {
            log('❌ 找不到暱稱/帳號含 Ev02 或 Ev03 的玩家');
            log('\n--- 所有玩家列表（前40筆）---');
            users.slice(0, 40).forEach(u => {
                log(`  ${u.id.slice(0,8)} | username:${u.username||'－'} | nickname:${u.nickname||'－'} | email:${(u.email||'').slice(0,20)}`);
            });
            return;
        }

        log(`✅ 找到 ${targets.length} 位目標玩家：`);
        for (const u of targets) {
            log(`  → username:${u.username||'－'} | nickname:${u.nickname||'－'} (${u.id.slice(0,8)})`);
            const r = await fetch(`tables/users/${u.id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bio: 'Ev01的測試機器人' })
            });
            if (r.ok) {
                log(`  ✅ 簡介更新成功`);
            } else {
                const errText = await r.text().catch(()=>'');
                log(`  ❌ 更新失敗: ${r.status} ${errText}`);
            }
        }
        log('\n✅ 完成！');
    } catch(e) {
        log('錯誤：' + e.message);
    }
}
</script>
</body>
</html>
